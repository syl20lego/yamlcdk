service: demo-api
provider:
  region: us-east-1
  stage: dev
  s3:
    # Optional cleanup role for buckets that enable autoDeleteObjects
    cleanupRoleArn: arn:aws:iam::123456789012:role/MyS3CleanupRole
  deployment:
    # Optional advanced deploy controls:
    fileAssetsBucketName: my-cdk-assets-us-east-1
    imageAssetsRepositoryName: my-cdk-assets-ecr
    cloudFormationExecutionRoleArn: arn:aws:iam::123456789012:role/MyCfnExecRole
    useCliCredentials: true
    requireBootstrap: false

functions:
  hello:
    handler: src/hello.handler
    runtime: nodejs20.x
    build:
      mode: typescript
    timeout: 10
    memorySize: 256
    environment:
      STAGE: dev
    iam:
      - readUsers
    url:
      authType: NONE
      cors:
        allowedMethods:
          - GET
        allowOrigins:
          - https://example.com
    events:
      http:
        - method: GET
          path: /hello
      sqs:
        - queue: jobs
          batchSize: 10
      sns:
        - topic: events
      dynamodb:
        - table: users
          batchSize: 100
          startingPosition: LATEST
      eventbridge:
        - schedule: rate(1 hour)

storage:
  s3:
    uploads:
      versioned: true
      autoDeleteObjects: false
  dynamodb:
    users:
      partitionKey:
        name: pk
        type: string
      billingMode: PAY_PER_REQUEST
      stream: NEW_AND_OLD_IMAGES

messaging:
  sqs:
    jobs: {}
  sns:
    events:
      displayName: Demo events
      tracingConfig: Active
      subscriptions:
        - type: sqs
          target: jobs

iam:
  statements:
    readUsers:
      actions:
        - dynamodb:GetItem
        - dynamodb:Query
      resources:
        - users

cdn:
  cachePolicies:
    apiCache:
      comment: Cache for API endpoints
      defaultTtl: 0
      minTtl: 0
      maxTtl: 31536000
      queryStringsConfig:
        behavior: all
  originRequestPolicies:
    allViewer:
      headersConfig:
        behavior: allViewer
      cookiesConfig:
        behavior: none
      queryStringsConfig:
        behavior: all
  distributions:
    api:
      comment: API CDN distribution
      origins:
        - id: apiOrigin
          domainName: xyz.execute-api.us-east-1.amazonaws.com
          httpsPort: 443
          originProtocolPolicy: https-only
      defaultBehavior:
        targetOriginId: apiOrigin
        viewerProtocolPolicy: redirect-to-https
        cachePolicyId: apiCache
        originRequestPolicyId: allViewer
