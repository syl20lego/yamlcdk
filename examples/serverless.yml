service: demo-api
provider:
  name: aws
  stage: ${opt:stage, 'dev'}
  region: us-east-1
  runtime: nodejs20.x
  iam:
    deploymentRole: arn:aws:iam::638914547607:role/AldoDefaultCFNRole
  deployment:
    requireBootstrap: false
  deploymentBucket:
    name: aldo-serverless-build-omni-hybris-lab-dev-us-east-1
  tags:
    Team: platform

functions:
  hello:
    handler: src/hello.handler
    timeout: 10
    memorySize: 256
    environment:
      STAGE: ${sls:stage}
    url:
      cors: true
    events:
      - http: GET /hello
      - httpApi:
          method: POST
          path: /hello
      - sqs:
          arn: !GetAtt JobsQueue.Arn
          batchSize: 10
      - sns: dispatch
      - s3: uploads
      - schedule: rate(1 hour)

resources:
  Resources:
    JobsQueue:
      Type: AWS::SQS::Queue
      Properties:
        VisibilityTimeout: 30

    # ─── CloudFront ────────────────────────────────────────────
    ApiCachePolicy:
      Type: AWS::CloudFront::CachePolicy
      Properties:
        CachePolicyConfig:
          Name: demo-api-cache-policy
          DefaultTTL: 0
          MinTTL: 0
          MaxTTL: 31536000
          ParametersInCacheKeyAndForwardedToOrigin:
            HeadersConfig:
              HeaderBehavior: none
            CookiesConfig:
              CookieBehavior: none
            QueryStringsConfig:
              QueryStringBehavior: all
            EnableAcceptEncodingGzip: true

    AllViewerPolicy:
      Type: AWS::CloudFront::OriginRequestPolicy
      Properties:
        OriginRequestPolicyConfig:
          Name: demo-api-all-viewer
          HeadersConfig:
            HeaderBehavior: allViewer
          CookiesConfig:
            CookieBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: all

    ApiDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Origins:
            - Id: apiOrigin
              DomainName: xyz.execute-api.us-east-1.amazonaws.com
              CustomOriginConfig:
                HTTPSPort: 443
                OriginProtocolPolicy: https-only
          DefaultCacheBehavior:
            TargetOriginId: apiOrigin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: !Ref ApiCachePolicy
            OriginRequestPolicyId: !Ref AllViewerPolicy
          Enabled: true
